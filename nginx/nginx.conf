# ── nginx.conf — drop this into /etc/nginx/ on the host, or mount it ─────
# Rate limit zones — must be in http context, not server context.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version from error pages and headers.
    server_tokens off;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── Rate limit zones ─────────────────────────────────────────────────
    # General: 30 req/s per IP.
    limit_req_zone $binary_remote_addr zone=login:10m rate=30r/s;

    # Auth endpoints: 5 req/s per IP.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    limit_req_status 429;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json
                      application/javascript text/xml application/xml
                      application/xml+rss text/javascript;

    include /etc/nginx/conf.d/*.conf;
}
