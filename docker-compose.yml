services:

  # ── Next.js dashboard app ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap_app
    restart: unless-stopped
    environment:
      NODE_ENV:            production
      DATABASE_URL:        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:           redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_URL:        https://${DASHBOARD_DOMAIN}
      NEXTAUTH_SECRET:     ${NEXTAUTH_SECRET}
      AP_SSO_SECRET:       ${AP_SSO_SECRET}
      CF_TOKEN_ENCRYPTION_KEY: ${CF_TOKEN_ENCRYPTION_KEY}  
      JWT_ACCESS_SECRET:   ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET}      
      RUNCLOUD_API_TOKEN:  ${RUNCLOUD_API_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    # App is NOT exposed to the host — Nginx is the only public entry point.
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    # Not exposed to host — internal only.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (sessions + BullMQ job queues) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ap_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - internal
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: ap_worker
      restart: unless-stopped
      command: npx tsx worker.ts
      environment:
        NODE_ENV:                production
        DATABASE_URL:            postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
        REDIS_URL:               redis://:${REDIS_PASSWORD}@redis:6379
        AP_SSO_SECRET:           ${AP_SSO_SECRET}
        CF_TOKEN_ENCRYPTION_KEY: ${CF_TOKEN_ENCRYPTION_KEY}
        RUNCLOUD_API_TOKEN:      ${RUNCLOUD_API_TOKEN}
        JWT_ACCESS_SECRET:       ${JWT_ACCESS_SECRET}
        JWT_REFRESH_SECRET:      ${JWT_REFRESH_SECRET}
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      networks:
        - internal

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ap_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - internal

  # ── Certbot (Let's Encrypt) ────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: ap_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Runs once manually, then via cron renewal — not a long-running service.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
    # No external access — all inter-container traffic stays on this network.
    internal: false
